<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASTRAL GAME WEB</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/socket.io/socket.io.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=Bebas+Neue&family=Montserrat:wght@400;800&family=Comic+Neue:wght@700&family=Roboto:wght@700;900&family=Open+Sans:wght@700;800&family=Oswald:wght@700&family=Raleway:wght@800;900&family=Nunito:wght@800;900&family=Playfair+Display:wght@700;900&family=Caveat:wght@700&family=Rubik:wght@700;900&family=Pacifico&family=Yanone+Kaffeesatz:wght@700&family=Comfortaa:wght@700&family=Ruslan+Display&family=Kelly+Slab&family=Roboto+Slab:wght@700;900&family=Lobster&family=Alice&family=PT+Sans:wght@700&display=swap');
        
        body { background-color: #0f172a; color: #f8fafc; overflow: hidden; transition: font-family 0.3s ease; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }

        @keyframes shake { 0%, 100% { transform: translateX(-50%); } 20%, 60% { transform: translateX(calc(-50% - 10px)); } 40%, 80% { transform: translateX(calc(-50% + 10px)); } }
        .animate-shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in-up { animation: fadeInUp 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        @keyframes progress-shimmer { 0% { background-position: 0 0; } 100% { background-position: 40px 0; } }
        .animate-progress-shimmer { background-image: linear-gradient(45deg, rgba(255, 255, 255, 0.15) 25%, transparent 25%, transparent 50%, rgba(255, 255, 255, 0.15) 50%, rgba(255, 255, 255, 0.15) 75%, transparent 75%, transparent); background-size: 40px 40px; animation: progress-shimmer 1s linear infinite; }
        .tab-active { background: linear-gradient(135deg, rgba(99,102,241,0.2) 0%, rgba(168,85,247,0.2) 100%); border-right: 3px solid #818cf8; color: white; }
        .tab-inactive { color: #94a3b8; }
        .tab-inactive:hover { background: #1e293b; color: white; }
        .remote-widget { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .remote-hidden { transform: translateX(110%); }
        .remote-visible { transform: translateX(0); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const socket = io();

        // Укажите ВАШИ ключи Supabase здесь!
        const supabaseUrl = 'https://lqjagftaeejdufwwvjwd.supabase.co';
        const supabaseKey = 'sb_publishable_6-9IBhMX9CMVbIackZAJ9g_UUk5FDqx'; 
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        const formatTime = (totalSeconds) => {
            const h = Math.floor(Math.abs(totalSeconds) / 3600); const m = Math.floor((Math.abs(totalSeconds) % 3600) / 60); const s = Math.abs(totalSeconds) % 60;
            return `${totalSeconds < 0 ? '-' : ''}${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        };

        const knownGiftsCache = new Set();
        socket.on('check-and-save-gift', async (gift) => {
            if (!gift || !gift.gift_id || knownGiftsCache.has(gift.gift_id)) return;
            try {
                const { error } = await supabase.from('gift_library').upsert([{ gift_id: gift.gift_id, name: gift.name, icon: gift.icon, cost: gift.cost }], { onConflict: 'gift_id' });
                if (!error) knownGiftsCache.add(gift.gift_id);
            } catch (err) { }
        });

        function GiftModal({ isOpen, onClose, onSelect }) {
            const [gifts, setGifts] = useState([]); const [search, setSearch] = useState(''); const [isLoading, setIsLoading] = useState(false);
            useEffect(() => {
                if (!isOpen) return; setIsLoading(true);
                supabase.from('gift_library').select('*').then(({ data }) => { 
                    setIsLoading(false);
                    if (data && data.length > 0) {
                        const grouped = data.reduce((acc, curr) => {
                            const giftName = curr.name || 'Без названия';
                            if (!acc[giftName]) { acc[giftName] = { ...curr, name: giftName, ids: [curr.gift_id] }; } 
                            else if (!acc[giftName].ids.includes(curr.gift_id)) { acc[giftName].ids.push(curr.gift_id); }
                            return acc;
                        }, {});
                        setGifts(Object.values(grouped).sort((a, b) => (a.cost || 0) - (b.cost || 0)));
                    }
                });
            }, [isOpen]);
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 bg-slate-950/90 flex items-center justify-center p-6 z-50 backdrop-blur-sm" style={{ fontFamily: 'Inter' }}>
                    <div className="bg-slate-900 border border-slate-700 rounded-2xl p-6 w-full max-w-4xl h-[85vh] flex flex-col shadow-2xl">
                        <div className="flex justify-between items-center mb-6"><h2 className="text-2xl font-bold text-white">Библиотека подарков</h2><button onClick={onClose} className="text-slate-400 hover:text-white transition text-xl"><i className="fa-solid fa-xmark"></i></button></div>
                        <input type="text" placeholder="Поиск подарка..." value={search} onChange={e => setSearch(e.target.value)} className="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 mb-4 focus:border-indigo-500 text-white outline-none" />
                        <div className="flex-1 overflow-y-auto grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 gap-4 pr-2 custom-scrollbar">
                            {isLoading ? <div className="col-span-full text-center text-indigo-400 mt-10 animate-pulse">Загрузка...</div> : 
                            gifts.filter(g => (g.name || '').toLowerCase().includes(search.toLowerCase())).map((g, idx) => (
                                <div key={idx} onClick={() => { onSelect(g); onClose(); setSearch(''); }} className="cursor-pointer bg-slate-800/50 p-4 rounded-xl hover:bg-slate-700 transition flex flex-col items-center group border border-transparent hover:border-indigo-500">
                                    <img src={g.icon} alt={g.name} className="w-16 h-16 object-contain mb-3 group-hover:scale-110 transition drop-shadow-lg" />
                                    <span className="text-sm text-center font-bold leading-tight text-slate-200">{g.name}</span>
                                    <span className="text-xs text-indigo-400 mt-1 font-semibold">{g.cost || 0} монет</span>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        function RemoteWidget({ isOpen, onClose }) {
            const [state, setState] = useState({ timeLeft: 0, isFrozen: false, freezeTimeLeft: 0, currentTotalLikes: 0, likesRouletteThreshold: 100000, likesRouletteEnabled: false }); 
            const [customSeconds, setCustomSeconds] = useState(60); const [history, setHistory] = useState([]);

            useEffect(() => { 
                socket.on('timer-tick', s => setState(s)); 
                socket.on('new-alert', data => setHistory(prev => [data, ...prev].slice(0, 50)));
                return () => { socket.off('timer-tick'); socket.off('new-alert'); }; 
            }, []);

            return (
                <div className={`remote-widget fixed top-4 right-4 bottom-4 w-[400px] bg-slate-900 border border-slate-700 rounded-3xl shadow-2xl flex flex-col p-5 z-50 overflow-hidden ${isOpen ? 'remote-visible' : 'remote-hidden'}`} style={{ fontFamily: 'Inter' }}>
                    <div className="flex justify-between items-center mb-4">
                        <h2 className="text-slate-400 font-bold tracking-widest uppercase">Пульт Управления</h2>
                        <button onClick={onClose} className="text-slate-500 hover:text-white transition bg-slate-800 w-8 h-8 rounded-full"><i className="fa-solid fa-xmark"></i></button>
                    </div>
                    
                    <div className="text-6xl font-black mb-2 text-center drop-shadow-[0_0_15px_rgba(255,255,255,0.3)] text-white">{formatTime(state.timeLeft)}</div>
                    
                    {state.isFrozen && (
                        <div className="bg-cyan-500/20 border border-cyan-500/50 text-cyan-400 font-bold px-4 py-1 rounded-full text-center text-sm mb-4 animate-pulse shadow-[0_0_15px_rgba(6,182,212,0.3)]">
                            ❄️ ЗАМОРОЖЕНО ({state.freezeTimeLeft} сек)
                        </div>
                    )}

                    {state.likesRouletteEnabled && (
                        <div className="w-full mb-4 shrink-0 bg-slate-800/50 p-3 rounded-xl border border-slate-700 shadow-inner">
                            <div className="flex justify-between items-end mb-2">
                                <span className="text-[10px] text-slate-400 font-bold uppercase tracking-wider"><i className="fa-solid fa-heart text-rose-500 mr-1 animate-pulse"></i> До рулетки</span>
                                <span className="text-xs font-black text-rose-400">{Math.max(0, ((Math.floor((state.currentTotalLikes || 0) / (state.likesRouletteThreshold || 100000)) + 1) * (state.likesRouletteThreshold || 100000)) - (state.currentTotalLikes || 0)).toLocaleString()} лайков</span>
                            </div>
                            <div className="w-full h-3 bg-slate-900 rounded-full overflow-hidden border border-slate-700 relative">
                                <div className="h-full bg-gradient-to-r from-rose-600 to-purple-600 animate-progress-shimmer transition-all duration-500" style={{ width: `${Math.min(100, Math.max(0, (((state.currentTotalLikes || 0) % (state.likesRouletteThreshold || 100000)) / (state.likesRouletteThreshold || 100000)) * 100))}%` }}></div>
                            </div>
                        </div>
                    )}

                    <div className="w-full mb-4 shrink-0">
                        <div className="grid grid-cols-4 gap-2 mb-4">
                            {[60, 300, 600, 1800].map(s => <button key={`a${s}`} className="bg-emerald-600/20 text-emerald-400 hover:bg-emerald-600 hover:text-white border border-emerald-500/30 rounded-lg py-1 text-xs font-black transition" onClick={() => socket.emit('manual-add', s)}>+{s/60}м</button>)}
                            {[60, 300, 600, 1800].map(s => <button key={`s${s}`} className="bg-rose-600/20 text-rose-400 hover:bg-rose-600 hover:text-white border border-rose-500/30 rounded-lg py-1 text-xs font-black transition" onClick={() => socket.emit('manual-sub', s)}>-{s/60}м</button>)}
                        </div>
                        <input type="number" value={customSeconds} onChange={e => setCustomSeconds(Number(e.target.value))} className="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-2 font-black text-xl text-center text-white outline-none mb-2" />
                        <div className="grid grid-cols-2 gap-2">
                            <button className="bg-emerald-600 hover:bg-emerald-500 text-white py-2 rounded-xl text-sm font-bold transition flex items-center justify-center gap-2" onClick={() => socket.emit('manual-add', customSeconds)}><i className="fa-solid fa-plus"></i></button>
                            <button className="bg-rose-600 hover:bg-rose-500 text-white py-2 rounded-xl text-sm font-bold transition flex items-center justify-center gap-2" onClick={() => socket.emit('manual-sub', customSeconds)}><i className="fa-solid fa-minus"></i></button>
                        </div>
                        <div className="grid grid-cols-2 gap-2 mt-2">
                            <button className="bg-cyan-600 hover:bg-cyan-500 text-white py-2 rounded-xl text-sm font-bold transition flex justify-center items-center gap-1.5" onClick={() => socket.emit('manual-freeze')}><i className="fa-solid fa-snowflake"></i> + Фриз</button>
                            <button className="bg-orange-600 hover:bg-orange-500 text-white py-2 rounded-xl text-sm font-bold transition flex justify-center items-center gap-1.5" onClick={() => socket.emit('manual-unfreeze')}><i className="fa-solid fa-fire"></i> - Фриз</button>
                        </div>
                    </div>
                    
                    <div className="grid grid-cols-1 gap-2 w-full shrink-0 mb-4">
                        <button className="bg-indigo-600 hover:bg-indigo-500 text-white p-2 rounded-xl font-bold transition text-sm" onClick={() => socket.emit('toggle-timer')}>СТАРТ / ПАУЗА</button>
                        <button className="bg-purple-600 hover:bg-purple-500 text-white p-2 rounded-xl font-bold transition text-sm shadow-[0_0_15px_rgba(168,85,247,0.4)]" onClick={() => socket.emit('manual-trigger-roulette')}>КРУТИТЬ РУЛЕТКУ</button>
                    </div>

                    <div className="flex-1 overflow-y-auto bg-slate-950 rounded-xl p-2 border border-slate-800 flex flex-col gap-2 custom-scrollbar">
                        {history.map((h, i) => (
                            <div key={i} className="flex items-center gap-3 bg-slate-900 p-2 rounded-lg border border-slate-800 text-white">
                                <img src={h.avatar || 'https://via.placeholder.com/32'} className="w-8 h-8 rounded-full object-cover border border-slate-700" />
                                <div className="flex flex-col flex-1 overflow-hidden">
                                    <span className="text-sm font-bold truncate">{h.username}</span>
                                    <span className="text-xs text-slate-400 truncate">{h.giftName || h.type} {h.amount > 1 ? `(x${h.amount})` : ''}</span>
                                </div>
                                <span className={`text-sm font-black whitespace-nowrap ${h.timeAdded > 0 ? 'text-emerald-400' : h.timeAdded < 0 ? 'text-rose-400' : 'text-slate-300'}`}>{h.timeAdded > 0 ? '+' : ''}{h.timeAdded} {h.timeAdded !== 0 ? 'с' : ''}</span>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        function AuthScreen({ onLogin }) {
            const [email, setEmail] = useState(''); const [password, setPassword] = useState(''); const [isLogin, setIsLogin] = useState(true); const [error, setError] = useState('');
            const handleSubmit = async (e) => {
                e.preventDefault(); setError('');
                if (isLogin) {
                    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                    if (error) setError(error.message); else onLogin(data.user);
                } else {
                    const { data, error } = await supabase.auth.signUp({ email, password });
                    if (error) setError(error.message); else { setError('Регистрация успешна! Войдите.'); setIsLogin(true); }
                }
            };
            return (
                <div className="h-screen w-screen flex items-center justify-center bg-slate-950 text-white" style={{ fontFamily: 'Inter' }}>
                    <div className="bg-slate-900 p-8 rounded-3xl border border-slate-800 shadow-2xl w-full max-w-md">
                        <div className="flex justify-center mb-6"><span className="text-5xl drop-shadow-[0_0_20px_rgba(99,102,241,0.5)]">⚡</span></div>
                        <h1 className="text-3xl font-black text-center text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-purple-400 mb-6">ASTRAL GAME WEB</h1>
                        <form onSubmit={handleSubmit} className="flex flex-col gap-4">
                            {error && <div className="bg-rose-500/20 border border-rose-500 text-rose-400 p-3 rounded-xl text-sm text-center">{error}</div>}
                            <input type="email" placeholder="Email" value={email} onChange={e => setEmail(e.target.value)} className="bg-slate-950 border border-slate-700 text-white rounded-xl px-4 py-3 outline-none focus:border-indigo-500" required />
                            <input type="password" placeholder="Пароль" value={password} onChange={e => setPassword(e.target.value)} className="bg-slate-950 border border-slate-700 text-white rounded-xl px-4 py-3 outline-none focus:border-indigo-500" required />
                            <button type="submit" className="bg-indigo-600 hover:bg-indigo-500 font-bold py-3 rounded-xl mt-2 transition">{isLogin ? 'Войти' : 'Зарегистрироваться'}</button>
                        </form>
                        <p className="text-center text-slate-400 mt-4 text-sm cursor-pointer hover:text-white" onClick={() => setIsLogin(!isLogin)}>{isLogin ? 'Создать аккаунт' : 'Уже есть аккаунт? Войти'}</p>
                    </div>
                </div>
            );
        }

        function MainApp({ user, onLogout }) {
            const [activeTab, setActiveTab] = useState('connect');
            const [status, setStatus] = useState({ tt: { text: 'Ожидание', isActive: false, isStreamLive: false }, da: 'Ожидание', dp: 'Ожидание', dx: 'Ожидание' });
            const [isRunning, setIsRunning] = useState(false);
            const [modal, setModal] = useState({ isOpen: false, key: null });
            const [isRemoteOpen, setIsRemoteOpen] = useState(false);

            const defConfig = {
                username: '', ttApiKey: '', daToken: '', dpApiKey: '', dxToken: '', 
                initialTime: 60, bonusEnabled: true, bonusMin: 60, bonusMax: 300,
                isFreezeEnabled: false, giftFreeze: null, freezeDuration: 60, giftUnfreeze: null, unfreezeDuration: 60,
                isPenaltyEnabled: true, penaltyAmount: 600, penaltyThreshold: 300, giftPenalty: null,
                isSetTimeEnabled: true, giftSetTime: null, setTimeValue: 300, 
                isResetEnabled: true, giftReset: null,
                isMultiplierGiftEnabled: true, multiplierValue: 2, multiplierDuration: 60, giftMultiplier: null,
                isDebuffGiftEnabled: false, debuffValue: 2, debuffDuration: 60, giftDebuff: null,
                likesEnabled: true, likeThreshold: 100, likeTime: 10, likesRouletteEnabled: false, likesRouletteThreshold: 100000, 
                subsEnabled: true, subTime: 180, customGifts: [], giftRoulette: null, rouletteSlots: [], rouletteGiftAddsCost: false,
                styles: { fontFamily: 'Inter', timerColor: '#ffffff', timerGlow: 0.4, enableStroke: true, buffColor: '#34d399', debuffColor: '#f43f5e', floatPlusColor: '#34d399', floatMinusColor: '#f87171', buffCardBg: '#10b981', debuffCardBg: '#e11d48', rouletteBg: '#0f172a', likeAlertColor: '#f43f5e', followAlertColor: '#34d399' }
            };

            const [config, setConfig] = useState(defConfig);
            const [savedConfig, setSavedConfig] = useState(defConfig);
            const hasChanges = JSON.stringify(savedConfig) !== JSON.stringify(config);

            const formatPayload = (data) => ({
                ...data,
                giftPenaltyIds: data.giftPenalty?.ids || [], giftSetTimeIds: data.giftSetTime?.ids || [], giftResetIds: data.giftReset?.ids || [], giftRouletteIds: data.giftRoulette?.ids || [], giftMultiplierIds: data.giftMultiplier?.ids || [], giftDebuffIds: data.giftDebuff?.ids || [], giftFreezeIds: data.giftFreeze?.ids || [], giftUnfreezeIds: data.giftUnfreeze?.ids || [],
                customTriggers: data.customGifts.filter(cg => cg.gift).map(cg => ({ ids: cg.gift.ids || [], type: cg.type, value: cg.value, threshold: cg.threshold || 0, isEnabled: cg.isEnabled }))
            });

            useEffect(() => {
                socket.emit('join-room', user.id);
                supabase.from('ttimer_settings').select('config').eq('user_id', user.id).single().then(({ data, error }) => {
                    if (data && data.config) {
                        const merged = { ...defConfig, ...data.config, styles: { ...defConfig.styles, ...(data.config.styles || {}) } };
                        setConfig(merged); setSavedConfig(merged);
                        socket.emit('update-settings', formatPayload(merged));
                    }
                });

                socket.on('status-update', s => setStatus(s));
                socket.on('timer-tick', s => setIsRunning(s.isRunning));
                window.addEventListener('message', (e) => { if (e.data && e.data.type === 'da_auth') { const hash = new URLSearchParams(e.data.hash); const token = hash.get('access_token'); if (token) socket.emit('connect-da-token', token); } });
                return () => { socket.off('status-update'); socket.off('timer-tick'); };
            }, [user.id]);

            const handleSave = async () => { 
                await supabase.from('ttimer_settings').upsert({ user_id: user.id, config });
                setSavedConfig(config); 
                socket.emit('update-settings', formatPayload(config)); 
            };
            const handleCancel = () => { setConfig(savedConfig); };
            const setCfgStyle = (key, val) => setConfig(p => ({...p, styles: {...p.styles, [key]: val}}));

            const TabBtn = ({ id, icon, text }) => ( <button onClick={() => { if(hasChanges) { document.getElementById('save-bar')?.classList.add('animate-shake'); setTimeout(()=>document.getElementById('save-bar')?.classList.remove('animate-shake'), 400); return;} setActiveTab(id); }} className={`w-full flex items-center gap-3 px-6 py-4 font-semibold transition ${activeTab === id ? 'tab-active' : 'tab-inactive'}`}><i className={icon + " w-5 text-center text-lg"}></i> {text}</button> );

            // Применяем выбранный шрифт ко всему интерфейсу
            const appFontFamily = config.styles?.fontFamily || 'Inter';

            return (
                <div className="flex h-screen bg-slate-950 text-slate-200" style={{ fontFamily: appFontFamily }}>
                    <div className="w-72 bg-slate-900 border-r border-slate-800 flex flex-col z-20 shrink-0 shadow-2xl relative">
                        <div className="p-6 border-b border-slate-800 flex flex-col gap-2 relative">
                            <div className="flex items-center gap-3">
                                <span className="text-3xl drop-shadow-md">⚡</span><h1 className="text-2xl font-black bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 to-purple-400 leading-none">ASTRAL<br/>GAME</h1>
                            </div>
                            
                            {/* ИНДИКАТОРЫ СОСТОЯНИЯ TIKTOK */}
                            <div className="flex items-center gap-4 mt-2">
                                <div className="flex items-center gap-1.5" title="Статус API TikTools">
                                    <div className={`w-2.5 h-2.5 rounded-full ${status.tt.isActive ? 'bg-emerald-500 shadow-[0_0_8px_#10b981]' : 'bg-rose-500 shadow-[0_0_8px_#f43f5e]'} transition-all`}></div>
                                    <span className="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Сервер</span>
                                </div>
                                <div className="flex items-center gap-1.5" title="Статус реального стрима TikTok">
                                    <div className={`w-2.5 h-2.5 rounded-full ${status.tt.isStreamLive ? 'bg-emerald-500 shadow-[0_0_8px_#10b981]' : 'bg-slate-600'} transition-all`}></div>
                                    <span className="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Стрим</span>
                                </div>
                            </div>
                        </div>
                        
                        <nav className="flex-1 py-4 flex flex-col gap-1 overflow-y-auto" style={{ fontFamily: 'Inter' }}>
                            <TabBtn id="connect" icon="fa-solid fa-wifi" text="Подключения" />
                            <TabBtn id="timer" icon="fa-solid fa-clock" text="Лайки, Время, Сабы" />
                            <TabBtn id="buffs" icon="fa-solid fa-bolt" text="Триггеры" />
                            <TabBtn id="roulette" icon="fa-solid fa-dice" text="Рулетка" />
                            <TabBtn id="style" icon="fa-solid fa-palette" text="Оформление" />
                            <TabBtn id="obs" icon="fa-solid fa-camera" text="Ссылки для OBS" />
                        </nav>
                        
                        <div className="p-4 border-t border-slate-800 space-y-3" style={{ fontFamily: 'Inter' }}>
                            {isRunning ? (
                                <button onClick={() => socket.emit('stop-timer')} className="w-full bg-rose-600/20 text-rose-500 border border-rose-500/50 py-3 rounded-xl font-bold transition flex justify-center items-center gap-2 hover:bg-rose-600 hover:text-white"><i className="fa-solid fa-stop"></i> Стоп</button>
                            ) : (

                                                    <div className="flex items-center gap-2 flex-1 bg-slate-900 p-2 rounded-lg border border-slate-700 cursor-pointer" onClick={() => setModal({ isOpen: true, key: `custom_${cg.id}` })}>
                                                        {cg.gift ? <><img src={cg.gift.icon} className="w-6 h-6"/> <span className="font-bold text-xs text-white truncate max-w-[150px]">{cg.gift.name}</span></> : <span className="text-slate-500 text-xs font-bold px-2">Выбрать подарок...</span>}
                                                    </div>
                                                    
                                                    <select value={cg.type} onChange={e => setConfig(p=>({...p, customGifts: p.customGifts.map(c=>c.id===cg.id?{...c, type: e.target.value}:c)}))} className="bg-slate-900 border border-slate-700 rounded-lg px-2 py-2 text-xs text-white outline-none font-bold" style={{ fontFamily: 'Inter' }}>
                                                        <option value="add">+ Добавить время</option>
                                                        <option value="sub">- Отнять время</option>
                                                        <option value="sub_threshold">- Отнять (до порога)</option>
                                                        <option value="set">= Установить время</option>
                                                        <option value="reset">Обнулить (0)</option>
                                                    </select>
                                                    
                                                    {cg.type !== 'reset' && cg.type !== 'sub_threshold' && (
                                                        <input type="number" value={cg.value} onChange={e => setConfig(p=>({...p, customGifts: p.customGifts.map(c=>c.id===cg.id?{...c, value: Number(e.target.value)}:c)}))} className="w-20 bg-slate-900 border border-slate-700 rounded-lg px-2 py-2 text-xs text-center font-bold text-white outline-none" placeholder="Сек" style={{ fontFamily: 'Inter' }} />
                                                    )}
                                                    
                                                    {cg.type === 'sub_threshold' && (
                                                        <div className="flex gap-2" style={{ fontFamily: 'Inter' }}>
                                                            <input type="number" value={cg.value} onChange={e => setConfig(p=>({...p, customGifts: p.customGifts.map(c=>c.id===cg.id?{...c, value: Number(e.target.value)}:c)}))} className="w-20 bg-slate-900 border border-rose-700/50 rounded-lg px-2 py-2 text-xs text-center font-bold text-rose-400 outline-none" placeholder="Отнять" title="Сколько секунд отнять" />
                                                            <input type="number" value={cg.threshold !== undefined ? cg.threshold : 0} onChange={e => setConfig(p=>({...p, customGifts: p.customGifts.map(c=>c.id===cg.id?{...c, threshold: Number(e.target.value)}:c)}))} className="w-20 bg-slate-900 border border-emerald-700/50 rounded-lg px-2 py-2 text-xs text-center font-bold text-emerald-400 outline-none" placeholder="Порог" title="Ниже скольки секунд не опускать таймер" />
                                                        </div>
                                                    )}
                                                    
                                                    <button onClick={() => setConfig(p=>({...p, customGifts: p.customGifts.filter(c=>c.id!==cg.id)}))} className="w-8 h-8 flex items-center justify-center text-slate-600 hover:text-rose-500 bg-slate-900 rounded-lg transition"><i className="fa-solid fa-trash"></i></button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'roulette' && (
                                <div className="space-y-6 animate-fade-in-up">
                                    <h2 className="text-3xl font-black text-white mb-6">Рулетка</h2>
                                    <div className="bg-slate-900 border border-indigo-500/30 p-6 rounded-2xl shadow-xl flex flex-col gap-4">
                                        <div className="flex items-center justify-between">
                                            <div><h3 className="font-bold text-white mb-1">Триггер рулетки</h3><p className="text-xs text-slate-400">Подарок, который запускает колесо</p></div>
                                            <div className="flex items-center gap-3 bg-slate-950 px-4 py-2 rounded-xl border border-slate-700">
                                                {config.giftRoulette ? <div className="flex items-center gap-2"><img src={config.giftRoulette.icon} className="w-6 h-6"/> <span className="font-bold text-sm text-white">{config.giftRoulette.name}</span></div> : <span className="text-slate-500 text-sm">Не выбран</span>}
                                                <button onClick={() => setModal({ isOpen: true, key: 'giftRoulette' })} className="ml-2 bg-indigo-600 px-3 py-1 rounded text-xs font-bold text-white" style={{ fontFamily: 'Inter' }}>Изменить</button>
                                            </div>
                                        </div>
                                        <div className="flex items-center gap-3 bg-slate-950 p-3 rounded-xl border border-slate-800 cursor-pointer" onClick={() => setConfig({...config, rouletteGiftAddsCost: !config.rouletteGiftAddsCost})}>
                                            <div className={`w-10 h-5 rounded-full relative ${config.rouletteGiftAddsCost ? 'bg-indigo-500' : 'bg-slate-700'}`}><div className={`w-4 h-4 rounded-full bg-white absolute top-0.5 transition-transform ${config.rouletteGiftAddsCost ? 'translate-x-5' : 'translate-x-1'}`}></div></div>
                                            <div><span className="text-sm font-bold text-white block">Учитывать стоимость подарка</span><span className="text-xs text-slate-500 block">Добавляет стоимость подарка (+сек) в таймер перед запуском рулетки</span></div>
                                        </div>
                                    </div>
                                    
                                    <div className="bg-slate-900 border border-slate-800 p-6 rounded-2xl">
                                        <div className="flex justify-between items-center mb-6"><h3 className="font-bold text-white">Слоты колеса</h3><button onClick={() => setConfig({...config, rouletteSlots: [...config.rouletteSlots, { id: Date.now().toString(), label: 'Новый слот', type: 'add_time', value: 60, chance: 10, color: '#6366f1', isEliminable: false, isEnabled: true }]})} className="bg-slate-800 px-3 py-1.5 rounded-lg text-sm font-bold text-white" style={{ fontFamily: 'Inter' }}><i className="fa-solid fa-plus"></i> Слот</button></div>
                                        <div className="space-y-3">
                                            {config.rouletteSlots.map(slot => (
                                                <div key={slot.id} className={`flex gap-2 items-center bg-slate-950 p-3 rounded-xl border ${slot.isEnabled !== false ? 'border-slate-800' : 'border-slate-800/50 opacity-50'}`}>
                                                    <div onClick={() => setConfig(p=>({...p, rouletteSlots: p.rouletteSlots.map(s=>s.id===slot.id?{...s, isEnabled: s.isEnabled === false ? true : false}:s)}))} className={`w-10 h-5 rounded-full relative cursor-pointer ${slot.isEnabled !== false ? 'bg-emerald-500' : 'bg-slate-700'}`}><div className={`w-4 h-4 rounded-full bg-white absolute top-0.5 transition-transform ${slot.isEnabled !== false ? 'translate-x-5' : 'translate-x-1'}`}></div></div>
                                                    <input type="color" value={slot.color} onChange={e => setConfig(p=>({...p, rouletteSlots: p.rouletteSlots.map(s=>s.id===slot.id?{...s, color: e.target.value}:s)}))} className="w-8 h-8 rounded border-none bg-transparent cursor-pointer" />
                                                    <input type="text" value={slot.label} onChange={e => setConfig(p=>({...p, rouletteSlots: p.rouletteSlots.map(s=>s.id===slot.id?{...s, label: e.target.value}:s)}))} className="flex-1 min-w-[120px] bg-transparent outline-none font-bold text-white border-b border-slate-700 focus:border-indigo-500 px-2" />
                                                    <select value={slot.type} onChange={e => setConfig(p=>({...p, rouletteSlots: p.rouletteSlots.map(s=>s.id===slot.id?{...s, type: e.target.value}:s)}))} className="bg-slate-900 border border-slate-700 rounded-lg px-2 py-1.5 text-xs text-white outline-none font-bold" style={{ fontFamily: 'Inter' }}>
                                                        <option value="add_time">+ Время</option><option value="sub_time">- Время</option><option value="multiply_time">Умножить (*)</option><option value="divide_time">Разделить (/)</option><option value="set_time">= Время</option><option value="multiplier">Бафф x</option><option value="debuff">Дебафф x</option><option value="freeze">Заморозка</option><option value="unfreeze">Разморозка</option><option value="extra_spin">Еще прокрут</option><option value="reset_time">Обнулить</option><option value="special">Приз</option>
                                                    </select>
                                                    {['multiply_time','divide_time','multiplier','debuff'].includes(slot.type) && <input type="number" value={slot.multiplierValue||2} onChange={e => setConfig(p=>({...p, rouletteSlots: p.rouletteSlots.map(s=>s.id===slot.id?{...s, multiplierValue: Number(e.target.value)}:s)}))} className="w-12 bg-slate-900 border border-slate-700 rounded-lg px-2 py-1.5 text-xs text-center font-bold text-white outline-none" style={{ fontFamily: 'Inter' }} />}
                                                    {['add_time','sub_time','set_time','multiplier','debuff','extra_spin'].includes(slot.type) && <input type="number" value={slot.value} onChange={e => setConfig(p=>({...p, rouletteSlots: p.rouletteSlots.map(s=>s.id===slot.id?{...s, value: Number(e.target.value)}:s)}))} className="w-16 bg-slate-900 border border-slate-700 rounded-lg px-2 py-1.5 text-xs text-center font-bold text-white outline-none" style={{ fontFamily: 'Inter' }} />}
                                                    <div className="flex items-center bg-slate-900 border border-slate-700 rounded-lg px-2 py-1.5 w-20" style={{ fontFamily: 'Inter' }}><input type="number" value={slot.chance} onChange={e => setConfig(p=>({...p, rouletteSlots: p.rouletteSlots.map(s=>s.id===slot.id?{...s, chance: Number(e.target.value)}:s)}))} className="bg-transparent w-full outline-none text-xs text-right font-bold text-white"/> <span className="text-xs text-slate-500 ml-1 font-bold">%</span></div>
                                                    <button onClick={() => setConfig(p=>({...p, rouletteSlots: p.rouletteSlots.map(s=>s.id===slot.id?{...s, isEliminable: !s.isEliminable}:s)}))} className={`px-2 py-1.5 rounded-lg text-xs font-bold border ${slot.isEliminable ? 'bg-indigo-500/20 text-indigo-400 border-indigo-500/50' : 'bg-slate-900 text-slate-500 border-slate-700'}`} style={{ fontFamily: 'Inter' }}>{slot.isEliminable ? '1 РАЗ' : 'МНОГОР.'}</button>
                                                    <button onClick={() => setConfig(p=>({...p, rouletteSlots: p.rouletteSlots.filter(s=>s.id!==slot.id)}))} className="w-8 h-8 flex items-center justify-center text-slate-600 hover:text-rose-500 bg-slate-900 rounded-full"><i className="fa-solid fa-xmark"></i></button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            )}

                            {}
                            {activeTab === 'style' && (
                                <div className="space-y-6 animate-fade-in-up">
                                    <h2 className="text-3xl font-black text-white mb-6">Оформление виджетов</h2>
                                    <div className="grid grid-cols-2 gap-6">
                                        <div className="bg-slate-900 border border-slate-800 p-6 rounded-2xl shadow-xl space-y-6">
                                            <h3 className="font-bold text-indigo-400 border-b border-slate-800 pb-2"><i className="fa-solid fa-clock mr-2"></i>Таймер и Шрифты</h3>
                                            <div>
                                                <label className="block text-sm text-slate-400 mb-2 font-bold">Шрифт текста (применяется ко всему)</label>
                                                <select value={config.styles.fontFamily} onChange={e=>setCfgStyle('fontFamily', e.target.value)} className="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 outline-none text-white font-bold" style={{ fontFamily: 'Inter' }}>
                                                    <option value="Inter">Inter (Современный)</option>
                                                    <option value="Bebas Neue">Bebas Neue (Жирный/Крупный)</option>
                                                    <option value="Montserrat">Montserrat (Округлый)</option>
                                                    <option value="Comic Neue">Comic Neue (Веселый)</option>
                                                    <option value="Oswald">Oswald (Строгий)</option>
                                                    <option value="Pacifico">Pacifico (Рукописный)</option>
                                                    <option value="Roboto">Roboto (Классика)</option>
                                                    <option value="Open Sans">Open Sans (Чистый)</option>
                                                    <option value="Raleway">Raleway (Элегантный)</option>
                                                    <option value="Nunito">Nunito (Мягкий)</option>
                                                    <option value="Playfair Display">Playfair Display (Винтаж)</option>
                                                    <option value="Caveat">Caveat (Небрежный маркер)</option>
                                                    <option value="Rubik">Rubik (Массивный)</option>
                                                    <option value="Comfortaa">Comfortaa (Супер-круглый)</option>
                                                    <option value="Ruslan Display">Ruslan Display (Славянский)</option>
                                                    <option value="Kelly Slab">Kelly Slab (Квадратный)</option>
                                                    <option value="Roboto Slab">Roboto Slab (Засечки)</option>
                                                    <option value="Lobster">Lobster (Ретро скрипт)</option>
                                                    <option value="Alice">Alice (Сказка)</option>
                                                    <option value="PT Sans">PT Sans (Строгий 2)</option>
                                                </select>
                                                <div className="mt-2 text-xs text-slate-500">Шрифт сразу применяется к панели управления для предпросмотра!</div>
                                            </div>
                                            <div className="flex items-center justify-between">
                                                <label className="text-sm text-slate-400 font-bold">Основной Цвет Таймера</label>
                                                <input type="color" value={config.styles.timerColor} onChange={e=>setCfgStyle('timerColor', e.target.value)} className="w-10 h-10 rounded cursor-pointer bg-transparent border-none" />
                                            </div>
                                            <div>
                                                <div className="flex justify-between mb-2"><label className="text-sm text-slate-400 font-bold">Сила свечения (Glow)</label><span className="text-white font-bold">{config.styles.timerGlow}</span></div>
                                                <input type="range" min="0" max="1" step="0.1" value={config.styles.timerGlow} onChange={e=>setCfgStyle('timerGlow', parseFloat(e.target.value))} className="w-full cursor-pointer accent-indigo-500" />
                                            </div>
                                            <div className="flex items-center justify-between bg-slate-950 p-4 rounded-xl border border-slate-700">
                                                <div className="flex flex-col"><span className="font-bold text-white">Черная обводка</span><span className="text-xs text-slate-500">Улучшает читаемость на светлом фоне</span></div>
                                                <div onClick={() => setCfgStyle('enableStroke', !config.styles.enableStroke)} className={`w-12 h-6 rounded-full relative cursor-pointer transition-colors ${config.styles.enableStroke ? 'bg-indigo-500' : 'bg-slate-700'}`}><div className={`w-5 h-5 rounded-full bg-white absolute top-0.5 transition-transform ${config.styles.enableStroke ? 'translate-x-6' : 'translate-x-1'}`}></div></div>
                                            </div>
                                        </div>

                                        <div className="space-y-6">
                                            <div className="bg-slate-900 border border-slate-800 p-6 rounded-2xl shadow-xl space-y-4">
                                                <h3 className="font-bold text-emerald-400 border-b border-slate-800 pb-2"><i className="fa-solid fa-bolt mr-2"></i>Цвета Уведомлений</h3>
                                                <div className="flex items-center justify-between mb-2"><label className="text-sm text-slate-400 font-bold">Цвет Плюса (+ сек)</label><input type="color" value={config.styles.floatPlusColor} onChange={e=>setCfgStyle('floatPlusColor', e.target.value)} className="w-10 h-10 rounded cursor-pointer bg-transparent border-none" /></div>
                                                <div className="flex items-center justify-between mb-2"><label className="text-sm text-slate-400 font-bold">Цвет Минуса (- сек)</label><input type="color" value={config.styles.floatMinusColor} onChange={e=>setCfgStyle('floatMinusColor', e.target.value)} className="w-10 h-10 rounded cursor-pointer bg-transparent border-none" /></div>
                                                <div className="flex items-center justify-between mb-2"><label className="text-sm text-slate-400 font-bold">Цвет текста "ЛАЙКИ"</label><input type="color" value={config.styles.likeAlertColor || '#f43f5e'} onChange={e=>setCfgStyle('likeAlertColor', e.target.value)} className="w-10 h-10 rounded cursor-pointer bg-transparent border-none" /></div>
                                                <div className="flex items-center justify-between"><label className="text-sm text-slate-400 font-bold">Цвет текста "ПОДПИСКА"</label><input type="color" value={config.styles.followAlertColor || '#34d399'} onChange={e=>setCfgStyle('followAlertColor', e.target.value)} className="w-10 h-10 rounded cursor-pointer bg-transparent border-none" /></div>
                                            </div>
                                            
                                            <div className="bg-slate-900 border border-slate-800 p-6 rounded-2xl shadow-xl space-y-4">
                                                <h3 className="font-bold text-purple-400 border-b border-slate-800 pb-2"><i className="fa-solid fa-dice mr-2"></i>Рулетка и Карточки</h3>
                                                <div className="flex items-center justify-between mb-2"><label className="text-sm text-slate-400 font-bold">Фон полосы вращения</label><input type="color" value={config.styles.rouletteBg} onChange={e=>setCfgStyle('rouletteBg', e.target.value)} className="w-10 h-10 rounded cursor-pointer bg-transparent border-none" /></div>
                                                <div className="flex items-center justify-between mb-2"><label className="text-sm text-slate-400 font-bold">Фон карточки Ускорения (Buff)</label><input type="color" value={config.styles.buffCardBg} onChange={e=>setCfgStyle('buffCardBg', e.target.value)} className="w-10 h-10 rounded cursor-pointer bg-transparent border-none" /></div>
                                                <div className="flex items-center justify-between"><label className="text-sm text-slate-400 font-bold">Фон карточки Замедления (Debuff)</label><input type="color" value={config.styles.debuffCardBg} onChange={e=>setCfgStyle('debuffCardBg', e.target.value)} className="w-10 h-10 rounded cursor-pointer bg-transparent border-none" /></div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'obs' && (
                                <div className="space-y-6 animate-fade-in-up">
                                    <h2 className="text-3xl font-black text-white mb-6">Ссылки для OBS</h2>
                                    <div className="bg-slate-900 border border-slate-800 p-6 rounded-2xl space-y-6">
                                        <p className="text-slate-400 text-sm">Эти ссылки уникальны для вашего аккаунта (UID: <span className="font-mono text-indigo-400">{user.id}</span>). Добавьте их как "Браузер" в OBS.</p>
                                        
                                        <div>
                                            <span className="font-bold text-white mb-2 block"><i className="fa-solid fa-clock text-indigo-400 mr-2"></i>Таймер</span>
                                            <div className="flex gap-2">
                                                <input type="text" readOnly value={`${window.location.origin}/timer.html?uid=${user.id}`} className="flex-1 bg-slate-950 border border-slate-700 rounded-lg px-4 py-3 text-sm text-slate-300 outline-none font-mono" />
                                                <button onClick={() => navigator.clipboard.writeText(`${window.location.origin}/timer.html?uid=${user.id}`)} className="bg-indigo-600 hover:bg-indigo-500 px-6 rounded-lg text-white font-bold transition" style={{ fontFamily: 'Inter' }}><i className="fa-solid fa-copy mr-2"></i>Копировать</button>
                                            </div>
                                        </div>

                                        <div>
                                            <span className="font-bold text-white mb-2 block"><i className="fa-solid fa-dice text-purple-400 mr-2"></i>Рулетка</span>
                                            <div className="flex gap-2">
                                                <input type="text" readOnly value={`${window.location.origin}/rullete.html?uid=${user.id}`} className="flex-1 bg-slate-950 border border-slate-700 rounded-lg px-4 py-3 text-sm text-slate-300 outline-none font-mono" />
                                                <button onClick={() => navigator.clipboard.writeText(`${window.location.origin}/rullete.html?uid=${user.id}`)} className="bg-purple-600 hover:bg-purple-500 px-6 rounded-lg text-white font-bold transition" style={{ fontFamily: 'Inter' }}><i className="fa-solid fa-copy mr-2"></i>Копировать</button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>

                    {/* SAVE BAR & REMOTE */}
                    {hasChanges && (
                        <div id="save-bar" className="absolute top-6 left-1/2 -translate-x-1/2 bg-slate-900/90 backdrop-blur-md border border-indigo-500/50 p-2 rounded-full shadow-2xl flex items-center gap-2 z-50">
                            <button onClick={handleSave} className="w-12 h-12 flex items-center justify-center bg-emerald-600 hover:bg-emerald-500 rounded-full text-white transition"><i className="fa-solid fa-check text-xl"></i></button>
                            <button onClick={handleCancel} className="w-12 h-12 flex items-center justify-center bg-slate-700 hover:bg-rose-500 rounded-full text-white transition"><i className="fa-solid fa-xmark text-xl"></i></button>
                        </div>
                    )}

                    <RemoteWidget isOpen={isRemoteOpen} onClose={() => setIsRemoteOpen(false)} />
                    <GiftModal isOpen={modal.isOpen} onClose={() => setModal({ isOpen: false, key: null })} onSelect={(gift) => {
                        if (modal.key.startsWith('custom_')) { const id = modal.key.split('_')[1]; setConfig(p => ({...p, customGifts: p.customGifts.map(cg => cg.id === id ? { ...cg, gift } : cg)})); } 
                        else { setConfig({ ...config, [modal.key]: gift }); }
                    }} />
                </div>
            );
        }

        function App() {
            const [user, setUser] = useState(null); const [loading, setLoading] = useState(true);
            useEffect(() => {
                supabase.auth.getSession().then(({ data: { session } }) => { setUser(session?.user ?? null); setLoading(false); });
                const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, session) => { setUser(session?.user ?? null); });
                return () => subscription.unsubscribe();
            }, []);
            if (loading) return <div className="h-screen w-screen flex items-center justify-center bg-slate-950 text-indigo-500 text-4xl"><i className="fa-solid fa-circle-notch fa-spin"></i></div>;
            return user ? <MainApp user={user} onLogout={() => supabase.auth.signOut()} /> : <AuthScreen onLogin={setUser} />;
        }
        const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);
    </script>
</body>
</html>
