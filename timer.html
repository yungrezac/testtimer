<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Таймер (OBS)</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=Bebas+Neue&family=Montserrat:wght@400;800&family=Comic+Neue:wght@700&family=Roboto:wght@700;900&family=Open+Sans:wght@700;800&family=Oswald:wght@700&family=Raleway:wght@800;900&family=Nunito:wght@800;900&family=Playfair+Display:wght@700;900&family=Caveat:wght@700&family=Rubik:wght@700;900&family=Pacifico&family=Yanone+Kaffeesatz:wght@700&family=Comfortaa:wght@700&family=Ruslan+Display&family=Kelly+Slab&family=Roboto+Slab:wght@700;900&family=Lobster&family=Alice&family=PT+Sans:wght@700&display=swap" rel="stylesheet">
    
    <style>
        body { background-color: transparent !important; color: #f8fafc; overflow: hidden; margin: 0; padding: 0;}
        
        @keyframes floatUpFade { 0% { transform: translate(-50%, 50px) scale(0.5); opacity: 0; } 15% { transform: translate(-50%, -10px) scale(1.2); opacity: 1; } 80% { transform: translate(-50%, -60px) scale(1); opacity: 1; } 100% { transform: translate(-50%, -100px) scale(0.8); opacity: 0; } }
        .float-up-anim { animation: floatUpFade 2.5s ease-out forwards; position: absolute; left: 50%; }

        .bonus-pop { animation: floatUpFade 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const socket = io();

        const formatTime = (totalSeconds) => {
            const h = Math.floor(Math.abs(totalSeconds) / 3600); const m = Math.floor((Math.abs(totalSeconds) % 3600) / 60); const s = Math.abs(totalSeconds) % 60;
            return `${totalSeconds < 0 ? '-' : ''}${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        };

        const hexToRgba = (hex, alpha) => {
            hex = hex || '#ffffff'; hex = hex.replace('#', '');
            let r = parseInt(hex.substring(0, 2), 16) || 0; let g = parseInt(hex.substring(2, 4), 16) || 0; let b = parseInt(hex.substring(4, 6), 16) || 0;
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        };

        const getStroke = (isThick, isEnabled, extraShadow = '') => {
            if (isEnabled === false) return extraShadow;
            const stroke = isThick ? '-0.04em -0.04em 0 #000, 0.04em -0.04em 0 #000, -0.04em 0.04em 0 #000, 0.04em 0.04em 0 #000, -0.04em 0 0 #000, 0.04em 0 0 #000, 0 -0.04em 0 #000, 0 0.04em 0 #000' : '-0.025em -0.025em 0 #000, 0.025em -0.025em 0 #000, -0.025em 0.025em 0 #000, 0.025em 0.025em 0 #000';
            return extraShadow ? `${stroke}, ${extraShadow}` : stroke;
        };

        function TimerView() {
            const [state, setState] = useState({ timeLeft: 0, isVictory: false, isBonusPhase: false, isRollingBonus: false, multiplier: { isActive: false } });
            const [alerts, setAlerts] = useState([]); const [config, setConfig] = useState({});

            useEffect(() => {
                const urlParams = new URLSearchParams(window.location.search);
                const uid = urlParams.get('uid');
                if (uid) socket.emit('join-room', uid);

                socket.on('settings-updated', cfg => setConfig(cfg));
                socket.on('timer-tick', s => setState(s));
                socket.on('new-alert', data => {
                    const id = Date.now() + Math.random();
                    let text = data.isSpecial ? data.giftName : null;
                    if (data.type === 'like' || data.type === 'follow') text = data.giftName || null;
                    setAlerts(prev => [...prev, { id, amount: data.timeAdded, text: text, type: data.type }]);
                    setTimeout(() => setAlerts(prev => prev.filter(n => n.id !== id)), 2500);
                });
                return () => { socket.off('settings-updated'); socket.off('timer-tick'); socket.off('new-alert'); };
            }, []);

            const styles = config.styles || {};
            const fontFam = styles.fontFamily || 'Inter'; const baseColor = styles.timerColor || '#ffffff';
            const glowIntensity = styles.timerGlow !== undefined ? styles.timerGlow : 0.4; const enableStroke = styles.enableStroke !== false;
            
            let colorStr = baseColor; let glowStr = getStroke(true, enableStroke, `0px 10px 40px ${hexToRgba(colorStr, glowIntensity)}, 0px 0px 60px ${hexToRgba(colorStr, glowIntensity * 0.75)}`);

            if (state.multiplier?.isActive) { colorStr = state.multiplier.type === 'buff' ? (styles.buffColor || '#34d399') : (styles.debuffColor || '#f43f5e'); glowStr = getStroke(true, enableStroke, `0px 10px 40px ${hexToRgba(colorStr, glowIntensity)}, 0px 0px 60px ${hexToRgba(colorStr, glowIntensity * 0.75)}`); } 
            else if (state.timeLeft > 0 && state.timeLeft <= 300) { colorStr = '#ef4444'; glowStr = getStroke(true, enableStroke, `0px 10px 40px ${hexToRgba(colorStr, glowIntensity)}, 0px 0px 60px ${hexToRgba(colorStr, glowIntensity * 0.75)}`); }

            const getAlertColor = (type, amount) => {
                if (type === 'like') return (styles.likeAlertColor || '#f43f5e');
                if (type === 'follow') return (styles.followAlertColor || '#34d399');
                if (amount < 0) return (styles.floatMinusColor || '#ef4444'); // Красный для минуса
                if (amount > 0) return (styles.floatPlusColor || '#22c55e'); // Зеленый для плюса
                return '#fbbf24';
            };

            return (
                <div className="h-screen w-screen flex flex-col relative overflow-hidden bg-transparent" style={{ fontFamily: fontFam }}>
                    <div className="absolute top-1/2 left-1/2 pointer-events-auto flex flex-col items-center justify-center w-[1000px] h-[560px]" style={{ transform: `translate(-50%, -50%) scale(1)` }}>
                        
                        <div className="absolute inset-0 pointer-events-none flex items-center justify-center z-30">
                            {alerts.map(num => (
                                <div key={num.id} className="float-up-anim font-black whitespace-nowrap drop-shadow-2xl" style={{ fontSize: `8rem`, color: getAlertColor(num.type, num.amount), textShadow: getStroke(true, enableStroke, '0px 5px 20px rgba(0,0,0,0.9)') }}>
                                    {num.text ? num.text : `${num.amount > 0 ? '+' : ''}${num.amount} сек`}
                                </div>
                            ))}
                        </div>

                        {state.isVictory ? (
                            <h1 className="font-black text-green-400 leading-none drop-shadow-2xl bonus-pop" style={{ fontSize: `11.9rem`, textShadow: getStroke(true, enableStroke, '0 10px 40px rgba(34,197,94,0.6)') }}>ПОБЕДА</h1>
                        ) : (
                            <div className="relative flex flex-col items-center justify-center w-full">
                                <div className="absolute bottom-full mb-4 w-full flex justify-center pointer-events-none">
                                    {state.isBonusPhase && (<div className="text-indigo-400 font-black uppercase tracking-widest text-3xl animate-pulse" style={{ textShadow: getStroke(false, enableStroke, '0 2px 5px rgba(0,0,0,0.5)') }}>{state.isRollingBonus ? "Определяем доп. время..." : "Доп. время"}</div>)}
                                </div>
                                <h1 className="font-black tabular-nums leading-none transition-all duration-300 relative z-10" style={{ color: colorStr, textShadow: glowStr, fontSize: `14rem` }}>{formatTime(state.timeLeft)}</h1>
                                
                                <div className="absolute top-full mt-4 w-full flex flex-row flex-wrap justify-center items-stretch gap-6 pointer-events-none z-30 px-4">
                                    {state.multiplier?.isActive && (
                                        <div className={`px-6 py-4 rounded-[2rem] border-4 shadow-2xl animate-bounce flex flex-col items-center justify-center gap-2`} style={{ background: state.multiplier.type === 'buff' ? `linear-gradient(135deg, ${styles.buffCardBg||'#10b981'} 0%, rgba(0,0,0,0.5) 100%)` : `linear-gradient(135deg, ${styles.debuffCardBg||'#e11d48'} 0%, rgba(0,0,0,0.5) 100%)`, borderColor: state.multiplier.type === 'buff' ? (styles.buffCardBg||'#10b981') : (styles.debuffCardBg||'#e11d48') }}>
                                            <span className={`text-5xl md:text-6xl font-black text-white uppercase tracking-wider text-center leading-none`} style={{ textShadow: getStroke(false, enableStroke) }}>{state.multiplier.type === 'buff' ? `⚡ ПРИБАВЛЯЕТ (x${state.multiplier.value}) ⚡` : `☠️ УБАВЛЯЕТ (x${state.multiplier.value}) ☠️`}</span>
                                            <span className={`text-6xl md:text-7xl font-black text-white tabular-nums bg-black/40 px-6 py-2 rounded-full border border-white/20 mt-1`} style={{ textShadow: getStroke(false, enableStroke) }}>{formatTime(state.multiplier.timeLeft)}</span>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<TimerView />);
    </script>
</body>
</html>
